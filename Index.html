<!DOCTYPE html>
<html>
      <head>
        <base target="_top">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <style>
          body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 15px;
            background: #f5f7fa;
          }

          h2 {
            margin-bottom: 10px;
          }

          .top-bar {
            position: sticky;
            top: 0;
            z-index: 1000;

            background: white;
            padding: 10px 12px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            border-bottom: 1px solid #ddd;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
          }

          .top-left {
            font-size: 35px;
            font-weight: 500;
          }

          .btn-generate {
            padding: 8px 14px;
            font-size: 14px;
            border-radius: 8px;
            border: none;
            background: #1a73e8;
            color: white;
            cursor: pointer;
            transition: 0.2s ease;
          }

          .btn-generate:hover {
            background: #1557b0;
          }

          /* LISTE JOUEURS */
          #liste {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
          }

          .player-card {
            background: white;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 100px;
          }

          .player-card:hover {
            background: #eef4ff;
            border-color: #1a73e8;
          }

          .player-card input {
            transform: scale(1.5);
            cursor: pointer;
          }

          .player-name {
            font-size: 40px;
            font-weight: 500;
          }

          .player-card:has(input:checked) {
            background: #d2e3fc;
            border-color: #1a73e8;
          }

          button {
            width: auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;

            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;

            border-radius: 999px;
            border: none;

            background: #1a73e8;
            color: white;

            cursor: pointer;
            transition: 0.2s ease;
          }

          button:hover {
            background: #1557b0;
            transform: translateY(-1px);
          }

          /* EQUIPES */
          #result {
            margin-top: 20px;
            display: grid;
            gap: 15px;
          }

          .team {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
          }

          .team strong {
            font-size: 18px;
          }

          @media (min-width: 768px) {
            #result {
              grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
          }

          /* PLAYER RESULT */
          .hidden {
            display: none;
          }

          .player-line {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 15px;
          }

          .note-adj {
            font-weight: 600;
            color: #1a73e8;
          }

          .note-diff {
            margin-left: 6px;
            font-size: 13px;
            font-weight: 500;
          }

          .diff-positive {
            color: #1e8e3e; /* vert */
          }

          .diff-negative {
            color: #d93025; /* rouge */
          }

          .diff-neutral {
            color: #777;
          }

        </style>
      </head>

      <body>

        <div class="top-bar">
          <div class="top-left">
            ⚽ Joueurs sélectionnés : <strong id="count">0</strong>
          </div>

          <div class="top-right">
            <button class="btn-generate" onclick="generer()">Générer</button>
          </div>
        </div>

        <div id="liste"></div>

        <div id="result"></div>

        <button onclick="toggleNotes()">Analyser</button>

        <script>

          let joueursData = [];

          // Charger les joueurs
          google.script.run.withSuccessHandler(function(joueurs) {

            joueursData = joueurs;

            let html = "";

            joueurs.forEach(j => {
              html += `
                <label class="player-card">
                  <input type="checkbox" value="${j.index}" onchange="updateStats()">
                  <span class="player-name">${j.nom}</span>
                </label>
              `;
            });

            document.getElementById("liste").innerHTML = html;

          }).getJoueurs();

          function updateStats() {

            const checked = document.querySelectorAll("input[type='checkbox']:checked");

            let total = 0;

            checked.forEach(cb => {
              total += parseFloat(cb.dataset.note);
            });

            const count = checked.length;
            const moyenne = count > 0 ? (total / count) : 0;

            document.getElementById("count").innerText = count;
            (2);
          }

          function generer() {

            const checked = document.querySelectorAll("input[type='checkbox']:checked");
            let selection = [];

            checked.forEach(cb => {
              selection.push(parseInt(cb.value));
            });

            if (selection.length < 7) {
              document.getElementById("result").innerHTML =
                "⚠️ Minimum 7 joueurs requis.";
              return;
            }

            document.getElementById("result").innerHTML = "Génération...";

            google.script.run
              .withSuccessHandler(function(result) {
                  if (result.error) {
                    document.getElementById("result").innerHTML = "⚠️ " + result.error;
                    return;
                  }
                afficherEquipes(result);
              })
              .genererEquipes(selection);
          }

          function afficherEquipes(result) {

            const teams = result.teams;
            const rawAvg = result.rawAvg;
            const adjAvg = result.adjAvg;

            let html = "<h3>Equipes générées</h3>";
            

            teams.forEach((team, index) => {

              html += "<div class='team'>";
              html += "<strong>Equipe " + (index + 1) + "</strong><br><br>";

              html += "⭐ Moyenne brute : <strong>" + rawAvg[index].toFixed(2) + "</strong> / 5<br>";
              html += "🔥 Moyenne ajustée : <strong>" + adjAvg[index].toFixed(2) + "</strong> / 5<br><br>";

              team.forEach(player => {
                const diff = player.noteAdj - player.noteRaw;

                let diffClass = "diff-neutral";
                let diffText = "";

                if (diff > 0.01) {
                  diffClass = "diff-positive";
                  diffText = `(+${diff.toFixed(2)})`;
                } 
                else if (diff < -0.01) {
                  diffClass = "diff-negative";
                  diffText = `(${diff.toFixed(2)})`;
                }

                html += `
                  <div class="player-line">
                    ${player.name} (${player.poste})
                    <span class="note-adj hidden">
                      ⭐ ${player.noteAdj.toFixed(2)}
                      <span class="note-diff ${diffClass}">
                        ${diffText}
                      </span>
                    </span>
                  </div>
                `;
              });

              html += "</div>";
            });

            document.getElementById("result").innerHTML = html;
          }

          function toggleNotes() {
            const notes = document.querySelectorAll(".note-adj");

            notes.forEach(n => {
              n.classList.toggle("hidden");
            });
          }

        </script>

      </body>
    </html>
