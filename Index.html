<!DOCTYPE html>
<html>
      <head>
        <base target="_top">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
          body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 15px;
            background: #f5f7fa;
          }

          h2 {
            margin-bottom: 10px;
          }

          .stats {
            font-size: 16px;
            margin-bottom: 15px;
          }

          /* LISTE JOUEURS */
          #liste {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            margin-bottom: 20px;
          }

          .player-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
          }

          .player-card:hover {
            background: #e8f0fe;
          }

          .player-card input {
            transform: scale(1.4);
            cursor: pointer;
          }

          .player-card:has(input:checked) {
            background: #d2e3fc;
            border-color: #1a73e8;
          }

          .player-name {
            font-size: 15px;
            font-weight: 500;
          }

          button {
            width: 100%;
            font-size: 18px;
            padding: 12px;
            margin-top: 10px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
          }

          button:hover {
            background: #1557b0;
          }

          /* EQUIPES */
          #result {
            margin-top: 20px;
            display: grid;
            gap: 15px;
          }

          .team {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
          }

          .team strong {
            font-size: 18px;
          }

          @media (min-width: 768px) {
            #result {
              grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
          }

        </style>
      </head>

      <body>

        <h2>⚽ Sélection des joueurs</h2>

        <div class="stats">
          👥 Joueurs sélectionnés : <strong id="count">0</strong><br>
        </div>

        <button onclick="generer()">Générer</button>

        <div id="liste"></div>

        <div id="result"></div>

        <script>

          let joueursData = [];

          // Charger les joueurs
          google.script.run.withSuccessHandler(function(joueurs) {

            joueursData = joueurs;

            let html = "";

            joueurs.forEach(j => {
              html += `
                <label class="player-card">
                  <input type="checkbox" value="${j.index}" onchange="updateStats()">
                  <span class="player-name">${j.nom}</span>
                </label>
              `;
            });

            document.getElementById("liste").innerHTML = html;

          }).getJoueurs();

          function updateStats() {

            const checked = document.querySelectorAll("input[type='checkbox']:checked");

            let total = 0;

            checked.forEach(cb => {
              total += parseFloat(cb.dataset.note);
            });

            const count = checked.length;
            const moyenne = count > 0 ? (total / count) : 0;

            document.getElementById("count").innerText = count;
            (2);
          }

          function generer() {

            const checked = document.querySelectorAll("input[type='checkbox']:checked");
            let selection = [];

            checked.forEach(cb => {
              selection.push(parseInt(cb.value));
            });

            if (selection.length < 7) {
              document.getElementById("result").innerHTML =
                "⚠️ Minimum 7 joueurs requis.";
              return;
            }

            document.getElementById("result").innerHTML = "Génération...";

            google.script.run
              .withSuccessHandler(function(result) {
                  if (result.error) {
                    document.getElementById("result").innerHTML = "⚠️ " + result.error;
                    return;
                  }
                afficherEquipes(result);
              })
              .genererEquipes(selection);
          }

          function afficherEquipes(result) {

            const teams = result.teams;
            const rawAvg = result.rawAvg;
            const adjAvg = result.adjAvg;

            let html = "<h3>Equipes générées</h3>";

            teams.forEach((team, index) => {

              html += "<div class='team'>";
              html += "<strong>Equipe " + (index + 1) + "</strong><br><br>";

              html += "⭐ Moyenne brute : <strong>" + rawAvg[index].toFixed(2) + "</strong> / 5<br>";
              html += "🔥 Moyenne ajustée : <strong>" + adjAvg[index].toFixed(2) + "</strong> / 5<br><br>";

              team.forEach(player => {
                html += player + "<br>";
              });

              html += "</div>";
            });

            document.getElementById("result").innerHTML = html;
          }

        </script>

      </body>
    </html>
